<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sweety❤Sakin</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
      background: linear-gradient(#2b1b3d, #4a2c5e, #6b3a5e);
    }

    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Floating hearts background */
    .heart {
      position: absolute;
      bottom: -50px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 20px;
      animation: floatUp linear infinite;
      pointer-events: none;
      user-select: none;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg) scale(1);
        opacity: 0.8;
      }

      100% {
        transform: translateY(-110vh) rotate(360deg) scale(1.4);
        opacity: 0;
      }
    }

    /* Title */
    .title {
      position: relative;
      z-index: 5;
      color: #fff;
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
      opacity: 0;
      animation: fadeIn 1.5s ease-out 0.3s forwards;
    }

    .title h1 {
      font-size: 28px;
      font-weight: 500;
      margin: 0;
    }

    .title p {
      font-size: 14px;
      opacity: 0.85;
      margin: 6px 0 0;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .rose-wrap {
      position: relative;
      width: 300px;
      height: 400px;
      z-index: 5;
      animation: sway 6s ease-in-out infinite;
      animation-delay: 2.8s;
      transform-origin: bottom center;
    }

    @keyframes sway {

      0%,
      100% {
        transform: rotate(0deg);
      }

      50% {
        transform: rotate(2deg);
      }
    }

    .stem {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 6px;
      height: 0;
      background: #4caf50;
      transform: translateX(-50%);
      animation: grow 2s ease-out forwards;
      border-radius: 3px;
    }

    @keyframes grow {
      to {
        height: 180px;
      }
    }

    .leaf {
      position: absolute;
      bottom: 60px;
      width: 50px;
      height: 25px;
      background: #4caf50;
      border-radius: 0 50% 0 50%;
      opacity: 0;
      animation: leafIn 1s ease-out 1.5s forwards;
    }

    .leaf.left {
      transform: translateX(-100%) rotate(20deg);
      left: calc(50% - 5px);
    }

    .leaf.right {
      transform: translateX(0%) rotate(-160deg);
      left: calc(50% + 5px);
    }

    @keyframes leafIn {
      to {
        opacity: 1;
      }
    }

    .flower {
      position: absolute;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
    }

    .petal {
      position: absolute;
      width: 90px;
      height: 90px;
      background: radial-gradient(circle at 30% 30%, #ffffff, #f1eef0 70%, #ddd6da 100%);
      border-radius: 0% 70% 0% 70%;
      top: 50%;
      left: 50%;
      transform-origin: 0% 0%;
      box-shadow: inset -6px -6px 12px rgba(0, 0, 0, 0.08);
      opacity: 0;
      animation: bloom 1.8s ease-out forwards;
      cursor: pointer;
      transition: filter 0.2s;
    }

    .petal:hover {
      filter: brightness(0.92);
    }

    @keyframes bloom {
      0% {
        opacity: 0;
        transform: rotate(var(--angle)) translate(0, 0) scale(0.1);
      }

      100% {
        opacity: 1;
        transform: rotate(var(--angle)) translate(20px, -20px) scale(1);
      }
    }

    .layer-outer .petal:nth-child(1) {
      --angle: 0deg;
      animation-delay: 0.6s;
    }

    .layer-outer .petal:nth-child(2) {
      --angle: 45deg;
      animation-delay: 0.7s;
    }

    .layer-outer .petal:nth-child(3) {
      --angle: 90deg;
      animation-delay: 0.8s;
    }

    .layer-outer .petal:nth-child(4) {
      --angle: 135deg;
      animation-delay: 0.9s;
    }

    .layer-outer .petal:nth-child(5) {
      --angle: 180deg;
      animation-delay: 1.0s;
    }

    .layer-outer .petal:nth-child(6) {
      --angle: 225deg;
      animation-delay: 1.1s;
    }

    .layer-outer .petal:nth-child(7) {
      --angle: 270deg;
      animation-delay: 1.2s;
    }

    .layer-outer .petal:nth-child(8) {
      --angle: 315deg;
      animation-delay: 1.3s;
    }

    .layer-inner .petal {
      width: 60px;
      height: 60px;
      background: radial-gradient(circle at 30% 30%, #ffffff, #faf8f9 70%, #e6dee2 100%);
    }

    .layer-inner .petal:nth-child(1) {
      --angle: 20deg;
      animation-delay: 1.6s;
    }

    .layer-inner .petal:nth-child(2) {
      --angle: 92deg;
      animation-delay: 1.7s;
    }

    .layer-inner .petal:nth-child(3) {
      --angle: 164deg;
      animation-delay: 1.8s;
    }

    .layer-inner .petal:nth-child(4) {
      --angle: 236deg;
      animation-delay: 1.9s;
    }

    .layer-inner .petal:nth-child(5) {
      --angle: 308deg;
      animation-delay: 2.0s;
    }

    .center {
      position: absolute;
      width: 35px;
      height: 35px;
      background: radial-gradient(circle at 35% 35%, #fffdf5, #fdf6e3 60%, #f0e4c8 100%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      animation: centerPop 1s ease-out 2.2s forwards;
      cursor: pointer;
    }

    @keyframes centerPop {
      to {
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .hint {
      position: relative;
      z-index: 5;
      color: rgba(255, 255, 255, 0.75);
      font-size: 13px;
      margin-top: 14px;
      opacity: 0;
      animation: fadeIn 1.5s ease-out 3s forwards;
      text-align: center;
    }

    /* Note popup */
    .note-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 50;
    }

    .note-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .note-card {
      background: #fffdf8;
      color: #5a3e4d;
      padding: 28px 24px;
      border-radius: 14px;
      max-width: 320px;
      text-align: center;
      font-size: 16px;
      line-height: 1.6;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      transform: scale(0.85);
      transition: transform 0.3s;
      font-family: 'Georgia', serif;
    }

    .note-overlay.show .note-card {
      transform: scale(1);
    }

    .note-card .heart-icon {
      font-size: 26px;
      margin-bottom: 10px;
      display: block;
    }

    .note-close {
      margin-top: 16px;
      background: #d96c8c;
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="title">
      <h2>Sweety Baby❤


      </h2>
      <h4>tumar sada golap</h4>
      
      <br/>
    </div>

    <div class="rose-wrap" id="roseWrap">
      <div class="stem"></div>
      <div class="leaf left"></div>
      <div class="leaf right"></div>
      <div class="flower" id="flower">
        <div class="layer-outer">
          <div class="petal" data-note="0"></div>
          <div class="petal" data-note="1"></div>
          <div class="petal" data-note="2"></div>
          <div class="petal" data-note="3"></div>
          <div class="petal" data-note="4"></div>
          <div class="petal" data-note="5"></div>
          <div class="petal" data-note="6"></div>
          <div class="petal" data-note="7"></div>
        </div>
        <div class="layer-inner">
          <div class="petal" data-note="8"></div>
          <div class="petal" data-note="9"></div>
          <div class="petal" data-note="10"></div>
          <div class="petal" data-note="11"></div>
          <div class="petal" data-note="12"></div>
        </div>
        <div class="center" data-note="13"></div>
      </div>
    </div>

    <div class="hint">Kyasu , paprigulo Khule dekho🤞</div>
  </div>

  <div class="note-overlay" id="noteOverlay">
    <div class="note-card" id="noteCard">
      <span class="heart-icon">❤️</span>
      <div id="noteText"></div>
      <button class="note-close" onclick="closeNote()">close</button>
    </div>
  </div>

  <script>
    // ---- EDIT THESE ----
    const herName = "Riya";
    const notes = [
      "I Love you Jan.",
      ">Ummmmmah Janu.",
      "Tumi onek Sundor kyasu and onek vala.",
      "Baby tumar thoth uff onek hot tumi.",
      "tumi amar secret jan.",
      "baby ami tome onek valobasi😊",
      "Tumi amar sathe sarajibon thakba bujhcho.",
      "Tumake niye ami onek ghurte chai",
      "Tumi amar jonno 4 ta bow hba tumake ami 4 bar kore valo basbo😘😘.",
      "Ummmahh tumar Gale",
      "Ummmah tumar thote.",
      "Ummmah tumar kopale",
      "Love you love you",
      "I love you. Forever and always.❤❤❤"
    ];
    // ---------------------

    document.querySelector('.title h1').textContent = "For " + herName + " 💕";

    // Floating hearts background
    const symbols = ["❤️", "💖", "💕", "💗", "🌹"];
    for (let i = 0; i < 22; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (14 + Math.random() * 18) + 'px';
      heart.style.animationDuration = (6 + Math.random() * 8) + 's';
      heart.style.animationDelay = (Math.random() * 8) + 's';
      document.body.appendChild(heart);
    }

    // Petal click -> show note
    const overlay = document.getElementById('noteOverlay');
    const noteText = document.getElementById('noteText');

    document.getElementById('flower').addEventListener('click', (e) => {
      const target = e.target.closest('[data-note]');
      if (!target) return;
      const idx = parseInt(target.dataset.note, 10);
      noteText.textContent = notes[idx % notes.length];
      overlay.classList.add('show');
    });

    function closeNote() {
      overlay.classList.remove('show');
    }
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeNote();
    });
  </script>

</body>

</html>
